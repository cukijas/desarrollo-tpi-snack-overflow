name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  server:
    name: Backend (server)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        # Non-blocking for now: committed code predates a consistent prettier pass
        # (~265 eslint issues, mostly formatting). A coordinated `prettier --write`
        # sweep is deferred until iteration-1 branches merge, to avoid conflict churn
        # in devs' in-flight local work. Flip continue-on-error to false after that.
        continue-on-error: true
        run: npx eslint src test --no-error-on-unmatched-pattern

      - name: Unit tests + coverage
        run: npm run test:cov

      - name: Production build
        # Gates prod-buildability: ts-jest transpiles leniently and misses errors
        # that `nest build` (tsc with isolatedModules) catches — e.g. TS1272.
        run: npm run build

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-coverage
          path: server/coverage/
          retention-days: 7

  e2e:
    name: Backend e2e (real Postgres + Redis)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env:
      DB_HOST: localhost
      DB_PORT: '5432'
      DB_USER: snack_user
      DB_PASSWORD: snack_password
      DB_NAME: snack_overflow
      DB_SSL: 'false'
      REDIS_HOST: localhost
      REDIS_PORT: '6379'
      JWT_SECRET: ci_test_secret_not_for_production
      # NODE_ENV != production keeps TypeORM synchronize=true so the schema is
      # auto-created against the ephemeral DB (no migrations exist yet).
      NODE_ENV: test
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: snack_user
          POSTGRES_PASSWORD: snack_password
          POSTGRES_DB: snack_overflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U snack_user -d snack_overflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: e2e + integration tests
        run: npm run test:e2e

  client:
    name: Frontend (client)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    env:
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
